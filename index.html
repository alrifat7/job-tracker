<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JobTrackr</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body class="mx-auto bg-gray-100 max-w-7xl">

<!-- Header -->
<header class="p-4">
    <h1 class="text-2xl font-bold text-blue-900 md:text-3xl">
        Job Application Tracker
    </h1>
</header>

<!-- Dashboard Cards -->
<section class="grid grid-cols-1 gap-4 p-4 sm:grid-cols-3">
    <div class="p-4 bg-white rounded-lg shadow">
        <p class="text-sm text-gray-500">Total Jobs</p>
        <h2 id="total" class="text-2xl font-bold text-blue-600 md:text-3xl">0</h2>
    </div>

    <div class="p-4 bg-white rounded-lg shadow">
        <p class="text-sm text-gray-500">Interview</p>
        <h2 id="interviewCount" class="text-2xl font-bold text-green-600 md:text-3xl">0</h2>
    </div>

    <div class="p-4 bg-white rounded-lg shadow">
        <p class="text-sm text-gray-500">Rejected</p>
        <h2 id="rejectedCount" class="text-2xl font-bold text-red-600 md:text-3xl">0</h2>
    </div>
</section>

<hr class="my-5">

<!-- Available Jobs Section -->
<section class="p-4">

    <!-- Title Row -->
    <div class="flex flex-col gap-2 mb-4 sm:flex-row sm:items-center sm:justify-between">
        <h2 class="text-lg font-semibold text-gray-800 md:text-xl">Available Jobs</h2>
        <span class="text-sm text-gray-500">
            <span id="tabJobCount">0</span> Jobs
        </span>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6 overflow-x-auto">
        <button id="tab-all" onclick="switchTab('all')" class="px-4 py-2 text-sm border rounded whitespace-nowrap">
            All
        </button>

        <button id="tab-interview" onclick="switchTab('interview')" class="px-4 py-2 text-sm border rounded whitespace-nowrap">
            Interview
        </button>

        <button id="tab-rejected" onclick="switchTab('rejected')" class="px-4 py-2 text-sm border rounded whitespace-nowrap">
            Rejected
        </button>
    </div>
</section>

<section id="allCards" class="p-4 space-y-4">

<!-- CARD (same style, responsive added) -->
<div class="flex flex-col gap-4 p-4 bg-white rounded-lg shadow card md:flex-row md:justify-between" data-status="all">

    <!-- LEFT -->
    <div class="space-y-4">
        <div>
            <h2 class="text-lg font-bold text-blue-900 md:text-xl">Mobile First Crop</h2>
            <p class="text-sm text-gray-500">React Native Developer</p>
        </div>

        <p class="text-sm text-gray-500">Remote • Full-time • $130,000 - $175,000</p>

        <div class="space-y-2">
            <span class="inline-block px-3 py-1 text-xs font-medium text-blue-900 rounded-md bg-blue-50">
                NOT APPLIED
            </span>

            <p class="text-sm text-gray-700">
                Build cross-platform mobile applications using React Native.
            </p>
        </div>

        <!-- BUTTONS -->
        <div class="flex flex-wrap gap-2">
            <button class="px-3 py-1 text-sm text-green-600 border border-green-500 rounded interview-btn">
                INTERVIEW
            </button>

            <button class="px-3 py-1 text-sm text-red-600 border border-red-500 rounded rejected-btn">
                REJECTED
            </button>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="flex justify-end md:items-start">
        <button class="p-2 border rounded-full btn-delete">
            <i class="fa-solid fa-trash"></i>
        </button>
    </div>
</div>

<!-- 🔁 Repeat same structure for other cards (just copy this card) -->

</section>

<script src="./script.js"></script>

</body>
</html>
